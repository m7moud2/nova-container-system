<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Nova Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard-shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 3.5rem;
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
        }

        .login-card h2 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-card p {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3rem;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body class="login-page">
    <div class="login-card">
        <div class="logo" style="justify-content: center; font-size: 2rem;">
            <i class="fas fa-rocket"></i> NOVA
        </div>
        <h2>Reset Password</h2>
        <p>Enter your email and we'll send you a recovery link.</p>

        <div id="success-message" class="success-message">Recovery link sent to your email!</div>

        <form id="resetForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <button type="submit" class="btn-primary"
                style="width: 100%; margin-top: 1.5rem; justify-content: center; height: 50px; font-size: 1.1rem;">
                Send Recovery Link
            </button>
        </form>

        <div class="login-footer">
            Remember your password? <a href="login.html">Sign in here</a>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const original = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            // Mock API delay
            setTimeout(() => {
                document.getElementById('success-message').style.display = 'block';
                btn.innerHTML = original;
                btn.disabled = false;
                document.getElementById('email').value = '';
            }, 1200);
        });
    </script>
</body>

</html>
