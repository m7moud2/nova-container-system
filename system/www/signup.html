<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Nova Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard-shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 3.5rem;
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
        }

        .login-card h2 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-card p {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3rem;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }

        .login-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body class="login-page">
    <div class="login-card">
        <div class="logo" style="justify-content: center; font-size: 2rem;">
            <i class="fas fa-rocket"></i> NOVA
        </div>
        <h2>Join Nova Cloud</h2>
        <p>Deploy your Ejari architecture in seconds.</p>

        <div id="error-message" class="error-message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Ahmed Mahmoud">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@ejari.cloud">
            </div>
            <div class="form-group">
                <label>Set Password</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn-primary"
                style="width: 100%; margin-top: 1.5rem; justify-content: center; height: 50px; font-size: 1.1rem;">
                Create Account <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="login-footer">
            Already on Nova? <a href="login.html">Sign in here</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('nova_token', data.token);
                    localStorage.setItem('nova_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Signup failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
